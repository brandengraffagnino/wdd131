<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazy Loading Images</title>
    <meta name="description" content="A demonstration of lazy loading images using HTML and CSS.">
    <meta name="author" content="Branden Graffagnino">
    <link rel="stylesheet" href="styles/lazyload.css">
    <script src="scripts/lazyload.js" defer></script>
</head>
<body>
    <main>
        <h1>Lazy Loading Demonstration</h1>
        <img src="images/whidbey-large.webp"
             alt="Landscape image 1"
             loading="lazy"
             width="400"
             height="600">
        <img src="images/whidbey-large.webp"
             alt="Landscape image 2"
             loading="lazy"
             width="400"
             height="600">
        <img src="images/whidbey-large.webp"  
            alt="Landscape image 3"
             loading="lazy"
             width="400"
             height="600">
         <img src="images/whidbey-large.webp"  
            alt="Landscape image 4"
             loading="lazy"
             width="400"
             height="600">
         <img src="images/whidbey-large.webp"  
            alt="Landscape image 5"
             loading="lazy"
             width="400"
             height="600">
        <img src="images/whidbey-large.webp"  
            alt="Landscape image 6"
             loading="lazy"
             width="400"
             height="600">
    </main>
    <footer>
         <p>
        &copy; <span id="currentyear"></span>
        🏝️ Branden Graffagnino 🏝️
        </p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
